<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Angor | Decentralized Kickstarter</title>
    <meta
      name="description"
      content="Angor is decentralized Kickstarter: Bitcoin-native project funding with milestone releases and recoverable unspent funds."
    />
    <meta name="theme-color" content="#f5f1e8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="https://angor.io/" aria-label="Angor home">
          <span class="brand-mark"></span>
          <span>Angor</span>
        </a>
        <p class="header-note">Bitcoin-native crowdfunding</p>
      </header>

      <main class="hero" id="top">
        <p class="eyebrow">The only Bitcoin protocol for funding projects</p>

        <h1>
          <span>DECENTRALIZED</span>
          <span>KICKSTARTER</span>
        </h1>

        <p class="hero-copy">
          Fund projects without a platform in the middle.
        </p>

        <div class="hero-actions">
          <a class="button button-solid" href="https://angor.io/explore">Explore Projects</a>
          <a class="button button-ghost" href="https://angor.io/launch">Get Funded</a>
        </div>

        <ul class="proof-strip" aria-label="Core Angor strengths">
          <li>Bitcoin-native</li>
          <li>Milestone releases</li>
          <li>Recover unspent funds</li>
        </ul>

        <p class="closing-note">No intermediaries. No platform risk.</p>
      </main>
    </div>
  </body>
</html>
